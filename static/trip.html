<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Your Trip — Wandr</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    [x-cloak] { display: none !important; }
    #map { width: 100%; height: 100%; }
    .leaflet-marker-icon { transition: transform 0.15s ease; }
    .marker-highlight { transform: scale(1.4) !important; z-index: 1000 !important; }
    .day-header { padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--border-light); }
    .day-header h3 { font-size: var(--text-lg); margin-bottom: var(--space-1); }
    .day-header-date { font-size: var(--text-sm); color: var(--text-tertiary); }
    .refresh-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-3) var(--space-5); background: var(--sand-100);
      border-bottom: 1px solid var(--border-light);
    }
    .refresh-bar span { font-size: var(--text-xs); color: var(--text-tertiary); }
    .refresh-error {
      padding: var(--space-2) var(--space-5); font-size: var(--text-xs);
      color: var(--coral-800); background: var(--coral-100); cursor: pointer;
      border-bottom: 1px solid var(--coral-200);
    }
    .save-sign-in {
      padding: var(--space-4) var(--space-5); background: var(--primary-light);
      border-bottom: 1px solid var(--teal-200); text-align: center;
    }
    .save-sign-in p { font-size: var(--text-sm); color: var(--teal-800); margin-bottom: var(--space-3); }
    .cost-badge { font-size: var(--text-xs); font-weight: 600; padding: 2px 6px; border-radius: var(--radius-sm); }
    .cost-free { background: var(--teal-100); color: var(--teal-700); }
    .cost-low { background: var(--amber-100); color: var(--amber-700); }
    .cost-mid { background: var(--coral-100); color: var(--coral-700); }
    .cost-high { background: var(--coral-200); color: var(--coral-800); }

    .score-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: var(--text-xs); padding: 3px 8px;
      border-radius: var(--radius-full);
      background: linear-gradient(90deg, var(--teal-100) var(--score-pct, 50%), var(--sand-100) var(--score-pct, 50%));
      border: 1px solid var(--border-light);
    }
    .score-label { color: var(--text-tertiary); }
    .score-value { font-weight: 700; color: var(--teal-700); }

    .activity-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: var(--text-xs); font-weight: 500;
      color: var(--primary); text-decoration: none;
      padding: 2px 8px; border-radius: var(--radius-sm);
      border: 1px solid var(--teal-200);
      transition: background 0.15s;
    }
    .activity-link:hover { background: var(--teal-100); }

    .pin-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: var(--space-3); padding: 6px 12px;
      font-size: var(--text-xs); font-weight: 500;
      color: var(--text-tertiary); background: var(--sand-100);
      border: 1px dashed var(--border-medium); border-radius: var(--radius-sm);
      cursor: pointer; transition: all 0.15s;
    }
    .pin-btn:hover { background: var(--amber-100); border-color: var(--amber-400); color: var(--amber-700); }
    .pin-btn.pinned {
      background: var(--amber-100); border: 1px solid var(--amber-400);
      color: var(--amber-700); border-style: solid;
    }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div x-data="tripView()" x-init="init()">
    <!-- Generating overlay -->
    <div x-show="generating" x-cloak class="generating-overlay" style="min-height:calc(100dvh - var(--nav-height))">
      <div class="compass-loader"></div>
      <div class="generating-text" x-text="generatingMsg"></div>
      <div class="generating-sub">This usually takes 15-30 seconds</div>
      <div class="progress-bar" style="max-width:300px">
        <div class="progress-bar-fill" :style="`width:${generatingProgress}%`"></div>
      </div>
    </div>

    <!-- Trip content -->
    <div x-show="!generating && trip" x-cloak style="position:relative">
      <!-- Loading overlay — covers split-view while map + activities init -->
      <div x-show="loading" x-cloak style="position:absolute;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:var(--bg)">
        <div style="text-align:center">
          <div class="compass-loader"></div>
          <div class="generating-text" style="margin-top:var(--space-6)">Loading your trip...</div>
        </div>
      </div>
      <div class="split-view">
        <!-- List panel -->
        <div class="split-panel split-list" :class="{ hidden: mobileView === 'map' }" id="list-panel">
          <!-- Day tabs -->
          <div style="padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-light)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-2)">
              <h2 style="font-size:var(--text-xl);font-family:var(--font-display)" x-text="trip.destination"></h2>
              <div style="display:flex;gap:var(--space-2)">
                <button class="btn btn-ghost btn-sm" @click="tlDay = currentDay; tlSelected = null; timelineOpen = true" title="Timeline">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="12" height="4" rx="1"/><rect x="3" y="16" width="15" height="4" rx="1"/></svg>
                  Timeline
                </button>
                <button class="btn btn-ghost btn-sm" @click="shareTrip()" title="Share">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                  Share
                </button>
              </div>
            </div>
            <div class="tabs">
              <template x-for="d in days" :key="d.day_number">
                <button class="tab" :class="{ active: currentDay === d.day_number }"
                        @click="switchDay(d.day_number)">
                  <span x-text="'Day ' + d.day_number"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Sign in prompt for anonymous -->
          <template x-if="!$store.auth.loggedIn">
            <div class="save-sign-in">
              <p>Sign in with Google to save this trip and access it later.</p>
              <a href="/api/auth/google" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
                Sign in with Google
              </a>
            </div>
          </template>

          <!-- Refresh bar -->
          <div class="refresh-bar">
            <span x-text="pinnedCount + ' pinned'"></span>
            <button class="btn btn-sm btn-secondary" @click="refreshDay()" :disabled="refreshing">
              <template x-if="refreshing"><span>Refreshing...</span></template>
              <template x-if="!refreshing"><span>Refresh unpinned</span></template>
            </button>
          </div>
          <div x-show="refreshError" x-cloak class="refresh-error" x-text="refreshError" @click="refreshError = ''"></div>

          <!-- Activities -->
          <div id="activities-list">
            <template x-for="a in currentActivities" :key="a.id">
              <div class="activity-card" :class="{ pinned: a.pinned, highlighted: highlightedId === a.id }"
                   :id="'activity-' + a.id"
                   @mouseenter="highlightMarker(a.id)" @mouseleave="unhighlightMarker(a.id)">
                <div class="activity-card-header">
                  <div class="activity-number" x-text="a.order"></div>
                  <div>
                    <div class="activity-name" x-text="a.name"></div>
                    <div class="activity-time" x-text="a.time_start + ' — ' + a.time_end + ' (' + a.duration_min + ' min)'"></div>
                  </div>
                </div>
                <div class="activity-body">
                  <div class="activity-desc" x-text="a.description"></div>
                  <div class="tip-callout" style="margin-top:var(--space-3)" x-show="a.tip">
                    <span class="tip-callout-icon">*</span>
                    <span x-text="a.tip"></span>
                  </div>
                  <div class="activity-meta" style="margin-top:var(--space-3)">
                    <span class="activity-tag" x-text="_typeConfig(a.type).emoji + ' ' + a.type"></span>
                    <span class="cost-badge" :class="costClass(a.cost_level)" x-text="a.cost_level === 'free' ? 'Free' : a.cost_estimate"></span>
                    <span class="activity-tag" x-show="a.address" x-text="a.address"></span>
                  </div>

                  <!-- Hidden gem score -->
                  <div style="margin-top:var(--space-3)" x-show="a.hidden_gem_score">
                    <div class="score-pill" :style="'--score-pct:' + (a.hidden_gem_score * 10) + '%'">
                      <span class="score-label">Hidden gem</span>
                      <span class="score-value" x-text="a.hidden_gem_score + '/10'"></span>
                    </div>
                  </div>

                  <!-- Links -->
                  <div style="display:flex;gap:var(--space-3);margin-top:var(--space-3);flex-wrap:wrap">
                    <a x-show="a.website" :href="a.website" target="_blank" rel="noopener" class="activity-link">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                      Website
                    </a>
                    <a x-show="a.name" :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(a.name + ' ' + (a.address || ''))" target="_blank" rel="noopener" class="activity-link">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                      Google Maps
                    </a>
                  </div>

                  <div style="margin-top:var(--space-2);font-size:var(--text-xs);color:var(--text-tertiary);font-style:italic" x-text="a.why" x-show="a.why"></div>

                  <!-- Pin + Remove buttons -->
                  <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;margin-top:var(--space-3)">
                    <button class="pin-btn" :class="{ pinned: a.pinned }" @click.stop="togglePin(a)">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" :fill="a.pinned ? 'currentColor' : 'none'"/>
                      </svg>
                      <span x-text="a.pinned ? 'Pinned — kept on refresh' : 'Pin — keep on refresh'"></span>
                    </button>
                    <button class="remove-btn" @click.stop="if(confirm('Remove ' + a.name + '?')) removeActivity(a)">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                      Remove
                    </button>
                  </div>
                </div>

                <!-- Transport strip between activities -->
                <template x-if="a.travel_to_next && currentActivities.indexOf(a) < currentActivities.length - 1">
                  <div class="transport-strip" @click.stop="editingTransport = (editingTransport === a.id ? null : a.id)">
                    <span class="transport-strip-icon" x-text="_transportIcon(a.travel_to_next.mode)"></span>
                    <span class="transport-strip-text" x-text="a.travel_to_next.duration_min + ' min'"></span>
                    <span class="transport-strip-dist" x-text="a.travel_to_next.distance_km ? a.travel_to_next.distance_km + ' km' : ''"></span>
                    <svg class="transport-strip-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                  </div>
                </template>
                <template x-if="editingTransport === a.id && a.travel_to_next">
                  <div class="transport-picker" @click.stop>
                    <template x-for="m in _getTransportPrefs()" :key="m">
                      <button class="pill" :class="{ selected: a.travel_to_next.mode === m }"
                              @click="changeTransportMode(a, m)">
                        <span x-text="_transportIcon(m)"></span>
                        <span x-text="m.replace('_',' ')"></span>
                      </button>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>

        <!-- Map panel -->
        <div class="split-map" :class="{ hidden: mobileView === 'list' }">
          <div id="map"></div>
          <div id="map-loader" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--sand-100);z-index:400">
            <div class="compass-loader" style="width:36px;height:36px"></div>
          </div>
        </div>

        <!-- Mobile view toggle -->
        <div class="view-toggle">
          <button class="view-toggle-btn" :class="{ active: mobileView === 'list' }" @click="setMobileView('list')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            List
          </button>
          <button class="view-toggle-btn" :class="{ active: mobileView === 'map' }" @click="setMobileView('map')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
            Map
          </button>
        </div>
      </div>

      <!-- Timeline Modal -->
      <div x-show="timelineOpen" x-cloak class="tl-overlay" @keydown.escape.window="timelineOpen = false" @click.self="timelineOpen = false">
        <div class="tl-modal" @click.stop>
          <!-- Header -->
          <div class="tl-header">
            <div>
              <h3 class="tl-title" x-text="trip.destination + ' — Timeline'"></h3>
            </div>
            <button class="btn btn-ghost btn-sm" @click="timelineOpen = false" style="margin-left:auto">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          <!-- Day tabs -->
          <div class="tl-tabs">
            <template x-for="d in days" :key="'tl-' + d.day_number">
              <button class="tab" :class="{ active: tlDay === d.day_number }" @click="tlDay = d.day_number; currentDay = d.day_number; tlSelected = null">
                <span x-text="'Day ' + d.day_number"></span>
              </button>
            </template>
          </div>

          <!-- Timeline body: vertical schedule -->
          <div class="tl-body">
            <div class="tl-schedule">
              <template x-for="(a, idx) in tlActivities" :key="'tl-a-' + a.id">
                <div>
                  <!-- Activity row -->
                  <div class="tl-row" :class="{ 'tl-row-pinned': a.pinned, 'tl-row-active': tlSelected?.id === a.id }"
                       @click="tlSelected = a"
                       :style="'--type-bg:' + _typeConfig(a.type).bg + ';--type-border:' + _typeConfig(a.type).border + ';--type-color:' + _typeConfig(a.type).color + ';--dur-pct:' + _tlDurPct(a) + '%'">
                    <div class="tl-row-time">
                      <span class="tl-row-start" x-text="a.time_start"></span>
                      <span class="tl-row-end" x-text="a.time_end"></span>
                    </div>
                    <div class="tl-row-accent"></div>
                    <div class="tl-row-content">
                      <span class="tl-row-emoji" x-text="_typeConfig(a.type).emoji"></span>
                      <span class="tl-row-name" x-text="a.name"></span>
                    </div>
                    <div class="tl-row-dur" x-text="_tlFmtDur(a.duration_min)"></div>
                  </div>
                  <!-- Transport connector (clickable) -->
                  <template x-if="a.travel_to_next && idx < tlActivities.length - 1">
                    <div class="tl-transit" style="cursor:pointer" @click.stop="editingTransport = (editingTransport === a.id ? null : a.id)">
                      <div class="tl-transit-line"></div>
                      <span class="tl-transit-label" x-text="_transportIcon(a.travel_to_next.mode) + ' ' + a.travel_to_next.duration_min + ' min'"></span>
                      <div class="tl-transit-line"></div>
                    </div>
                  </template>
                  <template x-if="editingTransport === a.id && a.travel_to_next">
                    <div class="transport-picker" style="padding-left:68px" @click.stop>
                      <template x-for="m in _getTransportPrefs()" :key="'tl-'+m">
                        <button class="pill" :class="{ selected: a.travel_to_next.mode === m }"
                                @click="changeTransportMode(a, m)">
                          <span x-text="_transportIcon(m)"></span>
                          <span x-text="m.replace('_',' ')"></span>
                        </button>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>

          <!-- Detail panel -->
          <div x-show="tlSelected" class="tl-detail">
            <div class="tl-detail-header">
              <div>
                <div class="tl-detail-name" x-text="tlSelected?.name"></div>
                <div class="tl-detail-time" x-text="(tlSelected?.time_start || '') + ' — ' + (tlSelected?.time_end || '') + ' (' + (tlSelected?.duration_min || '') + ' min)'"></div>
              </div>
              <div style="display:flex;gap:var(--space-2);align-items:center">
                <span class="activity-tag" x-text="_typeConfig(tlSelected?.type).emoji + ' ' + tlSelected?.type"></span>
                <span class="cost-badge" :class="costClass(tlSelected?.cost_level)" x-text="tlSelected?.cost_level === 'free' ? 'Free' : tlSelected?.cost_estimate"></span>
                <div class="score-pill" x-show="tlSelected?.hidden_gem_score" :style="'--score-pct:' + ((tlSelected?.hidden_gem_score || 0) * 10) + '%'">
                  <span class="score-label">Gem</span>
                  <span class="score-value" x-text="(tlSelected?.hidden_gem_score || 0) + '/10'"></span>
                </div>
              </div>
            </div>
            <div class="tl-detail-desc" x-text="tlSelected?.description"></div>
            <div class="tip-callout" x-show="tlSelected?.tip" style="margin-top:var(--space-3)">
              <span class="tip-callout-icon">*</span>
              <span x-text="tlSelected?.tip"></span>
            </div>
            <div style="display:flex;gap:var(--space-3);margin-top:var(--space-3);flex-wrap:wrap">
              <button class="pin-btn" :class="{ pinned: tlSelected?.pinned }" @click="togglePin(tlSelected); tlSelected = {...tlSelected, pinned: !tlSelected.pinned}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" :fill="tlSelected?.pinned ? 'currentColor' : 'none'"/>
                </svg>
                <span x-text="tlSelected?.pinned ? 'Pinned' : 'Pin'"></span>
              </button>
              <button class="remove-btn" @click="if(confirm('Remove ' + (tlSelected?.name || '') + '?')) { removeActivity(tlSelected); tlSelected = null; }">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                Remove
              </button>
              <a x-show="tlSelected?.website" :href="tlSelected?.website" target="_blank" rel="noopener" class="activity-link">Website</a>
              <a x-show="tlSelected?.name" :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent((tlSelected?.name || '') + ' ' + (tlSelected?.address || ''))" target="_blank" rel="noopener" class="activity-link">Google Maps</a>
            </div>
          </div>

          <!-- Footer -->
          <div class="tl-footer">
            <button class="btn btn-sm btn-secondary" @click="refreshDay(); timelineOpen = false" :disabled="refreshing">Refresh unpinned</button>
            <button class="btn btn-sm btn-ghost" @click="timelineOpen = false">Close</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/app.js"></script>
  <script>
  function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function estimateTransport(from, to, prefs, forcedMode) {
    const dist = haversineKm(from.lat, from.lng, to.lat, to.lng) * 1.3;
    const speeds = { walking: 5, bike: 15, bus: 15, public_transport: 20, car: 30, taxi: 30, train: 40 };

    let mode;
    if (forcedMode) {
      mode = forcedMode;
    } else {
      const available = (prefs || ['walking']);
      if (dist <= 1.5 && available.includes('walking')) {
        mode = 'walking';
      } else if (dist <= 5) {
        mode = available.find(m => m !== 'walking') || available[0];
      } else {
        mode = available.find(m => ['car', 'taxi', 'train', 'public_transport'].includes(m)) || available[available.length - 1];
      }
    }

    const speed = speeds[mode] || 20;
    const rawMin = (dist / speed) * 60;
    const duration = Math.max(5, Math.round(rawMin / 5) * 5);
    return { mode, duration_min: duration, distance_km: Math.round(dist * 10) / 10 };
  }

  function tripView() {
    return {
      trip: null,
      days: [],
      currentDay: 1,
      generating: false,
      generatingMsg: 'Creating your perfect itinerary...',
      generatingProgress: 0,
      refreshing: false,
      refreshError: '',
      highlightedId: null,
      mobileView: 'list',
      loading: true,
      map: null,
      markers: [],
      polyline: null,
      markerMap: {},
      timelineOpen: false,
      tlDay: 1,
      tlSelected: null,
      editingTransport: null,

      get currentActivities() {
        const day = this.days.find(d => d.day_number === this.currentDay);
        if (!day) return [];
        try { return JSON.parse(day.activities_json); } catch { return []; }
      },

      get pinnedCount() {
        return this.currentActivities.filter(a => a.pinned).length;
      },

      costClass(level) {
        const map = { free: 'cost-free', '$': 'cost-low', '$$': 'cost-mid', '$$$': 'cost-high' };
        return map[level] || 'cost-low';
      },

      get tlActivities() {
        const day = this.days.find(d => d.day_number === this.tlDay);
        if (!day) return [];
        try { return JSON.parse(day.activities_json); } catch { return []; }
      },

      // Duration as percentage of longest activity (for background fill)
      _tlDurPct(a) {
        const acts = this.tlActivities;
        if (!acts.length) return 0;
        const maxDur = Math.max(...acts.map(x => x.duration_min || 60));
        return Math.min(100, Math.round(((a.duration_min || 60) / maxDur) * 100));
      },

      // Format duration: 150 -> "2h30", 45 -> "45m"
      _tlFmtDur(min) {
        if (!min) return '';
        const h = Math.floor(min / 60);
        const m = min % 60;
        if (h === 0) return m + 'm';
        if (m === 0) return h + 'h';
        return h + 'h' + (m < 10 ? '0' : '') + m;
      },

      // Transport icon lookup
      _transportIcon(mode) {
        const icons = { walking: '\uD83D\uDEB6', public_transport: '\uD83D\uDE87', car: '\uD83D\uDE97', bike: '\uD83D\uDEB4', taxi: '\uD83D\uDE95', bus: '\uD83D\uDE8C', train: '\uD83D\uDE86' };
        return icons[(mode || '').toLowerCase()] || '\uD83D\uDEB6';
      },

      _typeConfig(type) {
        const configs = {
          restaurant: { emoji: '\uD83C\uDF74', bg: 'var(--coral-100)', border: 'var(--coral-300)', color: 'var(--coral-800)' },
          cafe:       { emoji: '\u2615',       bg: 'var(--amber-100)', border: 'var(--amber-300)', color: 'var(--amber-700)' },
          museum:     { emoji: '\uD83C\uDFDB\uFE0F', bg: 'var(--teal-100)', border: 'var(--teal-300)', color: 'var(--teal-800)' },
          bar:        { emoji: '\uD83C\uDF78', bg: '#f3e8ff',         border: '#c084fc',          color: '#6b21a8' },
          market:     { emoji: '\uD83D\uDECD\uFE0F', bg: '#fff7ed',   border: '#fdba74',          color: '#9a3412' },
          park:       { emoji: '\uD83C\uDF33', bg: '#ecfdf5',         border: '#6ee7b7',          color: '#065f46' },
          viewpoint:  { emoji: '\uD83D\uDC41\uFE0F', bg: '#eff6ff',   border: '#93c5fd',          color: '#1e40af' },
          experience: { emoji: '\u2728',       bg: '#fdf2f8',         border: '#f9a8d4',          color: '#9d174d' },
          attraction: { emoji: '\u2B50',       bg: '#eef2ff',         border: '#a5b4fc',          color: '#3730a3' },
        };
        return configs[type] || { emoji: '\uD83D\uDCCD', bg: 'var(--sand-100)', border: 'var(--sand-300)', color: 'var(--sand-700)' };
      },

      async init() {
        const params = new URLSearchParams(window.location.search);
        const tripId = params.get('id');
        if (!tripId) { window.location.href = '/'; return; }

        const data = await apiJson(`/api/trips/${tripId}`);
        if (!data || data.error) {
          showToast('Trip not found', 'error');
          window.location.href = '/';
          return;
        }

        const needsGeneration = (data.days || []).length === 0 && data.status !== 'complete';
        if (needsGeneration) this.generating = true;

        this.trip = data;
        this.days = data.days || [];

        // Register $watch BEFORE generateTrip so the transition is captured
        this.$watch('generating', (val) => {
          if (!val && this.trip) {
            this.loading = true;
            this.$nextTick(() => this._initMapAndReveal());
          }
        });

        if (needsGeneration) {
          await this.generateTrip(tripId);
          // $watch fires when generating→false (now registered correctly)
        } else {
          // Already generated — show loading overlay while map inits
          this.$nextTick(() => this._initMapAndReveal());
        }

        // Claim trip for logged-in user
        const auth = Alpine.store('auth');
        if (auth.loggedIn && !data.user_id) {
          api(`/api/trips/${tripId}/claim`, { method: 'PUT' });
        }
      },

      async generateTrip(tripId) {
        this.generating = true;
        this.generatingProgress = 5;

        // Simulate progress while waiting
        const interval = setInterval(() => {
          if (this.generatingProgress < 85) {
            this.generatingProgress += Math.random() * 8;
            const dayEstimate = Math.ceil(this.generatingProgress / (100 / (this.trip?.num_days || 3)));
            this.generatingMsg = `Planning day ${Math.min(dayEstimate, this.trip?.num_days || 3)} of ${this.trip?.num_days || 3}...`;
          }
        }, 1500);

        try {
          const res = await api(`/api/trips/${tripId}/generate`, { method: 'POST' });
          if (!res.ok) {
            const data = await res.json();
            showToast(data.error || 'Generation failed', 'error');
            this.generating = false;
            return;
          }

          this.generatingProgress = 100;
          this.generatingMsg = 'Your itinerary is ready!';

          // Reload trip data
          const freshData = await apiJson(`/api/trips/${tripId}`);
          this.trip = freshData;
          this.days = freshData.days || [];
          // $watch on generating handles map init
          this.generating = false;
        } catch (e) {
          showToast('Generation failed', 'error');
          this.generating = false;
        } finally {
          clearInterval(interval);
        }
      },

      _initMapAndReveal() {
        if (this._revealed) return;

        const mapEl = document.getElementById('map');
        if (!mapEl) {
          if (!this._mapRetries) this._mapRetries = 0;
          if (this._mapRetries++ < 20) {
            setTimeout(() => this._initMapAndReveal(), 200);
          } else {
            showToast('Map failed to load', 'error');
            this.loading = false;
          }
          return;
        }
        this._revealed = true;

        // Create map if not already done
        if (!this.map) {
          const destLat = this.trip?.destination_lat || 45;
          const destLng = this.trip?.destination_lng || 12;
          this.map = L.map('map', { zoomControl: true }).setView([destLat, destLng], 12);

          const tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19,
          }).addTo(this.map);

          // Wait for tiles + markers, then reveal everything at once
          const reveal = () => {
            if (this._didReveal) return;
            this._didReveal = true;
            const loader = document.getElementById('map-loader');
            if (loader) loader.style.display = 'none';
            this.loading = false;
          };

          tileLayer.once('load', () => {
            setTimeout(reveal, 100);
          });
          // Fallback: reveal after 2.5s even if tiles are slow
          setTimeout(reveal, 2500);

          setTimeout(() => {
            this.map.invalidateSize();
            this.updateMarkers();
          }, 300);
        } else {
          this.map.invalidateSize();
          this.updateMarkers();
          this.loading = false;
        }
      },

      updateMarkers() {
        if (!this.map) return;

        // Clear existing
        this.markers.forEach(m => this.map.removeLayer(m));
        this.markers = [];
        this.markerMap = {};
        if (this.polyline) { this.map.removeLayer(this.polyline); this.polyline = null; }

        const activities = this.currentActivities;
        if (!activities.length) return;

        const bounds = [];
        const latlngs = [];

        activities.forEach((a, i) => {
          if (!a.lat || !a.lng || (a.lat === 0 && a.lng === 0)) return;
          const ll = [a.lat, a.lng];
          bounds.push(ll);
          latlngs.push(ll);

          const isPinned = a.pinned;
          const tc = this._typeConfig(a.type);
          const bg = isPinned ? 'var(--amber-100)' : tc.bg;
          const border = isPinned ? 'var(--amber-400)' : tc.border;
          const icon = L.divIcon({
            className: 'wandr-marker',
            html: `<div class="wandr-marker-inner" style="background:${bg};border:2.5px solid ${border}">
              <span class="wandr-marker-emoji">${tc.emoji}</span>
              <span class="wandr-marker-num">${a.order}</span>
            </div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 18],
          });

          const marker = L.marker(ll, { icon }).addTo(this.map);
          const popupEl = document.createElement('div');
          const s = (t) => document.createTextNode(t);
          const strong = document.createElement('strong'); strong.appendChild(s(a.name)); popupEl.appendChild(strong);
          popupEl.appendChild(document.createElement('br'));
          const small = document.createElement('small'); small.appendChild(s(a.time_start + ' — ' + a.time_end)); popupEl.appendChild(small);
          popupEl.appendChild(document.createElement('br'));
          const em = document.createElement('em'); em.appendChild(s(a.description)); popupEl.appendChild(em);
          marker.bindPopup(popupEl, { autoPan: false });

          marker.on('click', () => {
            const el = document.getElementById('activity-' + a.id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });

          this.markers.push(marker);
          this.markerMap[a.id] = marker;
        });

        // Polyline
        if (latlngs.length > 1) {
          this.polyline = L.polyline(latlngs, {
            color: '#087d6b',
            weight: 2,
            opacity: 0.5,
            dashArray: '8, 8',
          }).addTo(this.map);
        }

        // Fit bounds
        if (bounds.length > 0) {
          this.map.fitBounds(bounds, { padding: [30, 30] });
        }
      },

      switchDay(dayNum) {
        this.currentDay = dayNum;
        this.tlDay = dayNum;
        this.tlSelected = null;
        this.$nextTick(() => this.updateMarkers());
      },

      highlightMarker(id) {
        this.highlightedId = id;
        const marker = this.markerMap[id];
        if (marker) {
          const el = marker.getElement();
          if (el) el.classList.add('marker-highlight');
        }
      },

      unhighlightMarker(id) {
        this.highlightedId = null;
        const marker = this.markerMap[id];
        if (marker) {
          const el = marker.getElement();
          if (el) el.classList.remove('marker-highlight');
        }
      },

      togglePin(activity) {
        const day = this.days.find(d => d.day_number === this.currentDay);
        if (!day) return;
        const activities = JSON.parse(day.activities_json);
        const target = activities.find(a => a.id === activity.id);
        if (target) target.pinned = !target.pinned;
        day.activities_json = JSON.stringify(activities);
        this.saveDay();
        this.$nextTick(() => this.updateMarkers());
      },

      async saveDay() {
        const tripId = new URLSearchParams(window.location.search).get('id');
        await api(`/api/trips/${tripId}/days/${this.currentDay}`, {
          method: 'PUT',
          body: JSON.stringify({ activities: this.currentActivities }),
        });
      },

      async refreshDay() {
        this.refreshing = true;
        this.refreshError = '';
        const tripId = new URLSearchParams(window.location.search).get('id');
        const pinned = this.currentActivities.filter(a => a.pinned);

        try {
          const res = await api(`/api/trips/${tripId}/days/${this.currentDay}/refresh`, {
            method: 'POST',
            body: JSON.stringify({ pinned_activities: pinned }),
          });

          if (!res.ok) {
            let errMsg = 'Refresh failed';
            try { const data = await res.json(); errMsg = data.error || errMsg; } catch {}
            if (errMsg.includes('429') || errMsg.includes('rate') || errMsg.includes('quota')) {
              this.refreshError = 'AI rate limit reached. Please wait a few minutes and try again.';
            } else {
              this.refreshError = 'Refresh failed. Please try again later.';
            }
            this.refreshing = false;
            return;
          }

          const data = await res.json();
          const day = this.days.find(d => d.day_number === this.currentDay);
          if (day) day.activities_json = JSON.stringify(data.activities);

          showToast('Activities refreshed!', 'success');
          this.$nextTick(() => this.updateMarkers());
        } catch (e) {
          this.refreshError = 'Connection error. Please check your network and try again.';
        }
        this.refreshing = false;
      },

      _getTransportPrefs() {
        if (!this.trip) return ['walking'];
        try {
          const p = JSON.parse(this.trip.preferences_json || '{}');
          const t = p.transport;
          return Array.isArray(t) ? t : (t ? [t] : ['walking']);
        } catch { return ['walking']; }
      },

      removeActivity(activity) {
        const day = this.days.find(d => d.day_number === this.currentDay);
        if (!day) return;
        let activities = JSON.parse(day.activities_json);
        const idx = activities.findIndex(a => a.id === activity.id);
        if (idx < 0) return;

        activities.splice(idx, 1);
        // Re-number order
        activities.forEach((a, i) => a.order = i + 1);

        // Recalc transport for the new adjacency
        if (idx > 0 && idx < activities.length) {
          const prev = activities[idx - 1];
          const next = activities[idx];
          prev.travel_to_next = estimateTransport(prev, next, this._getTransportPrefs());
        }
        // Clear travel_to_next on new last activity
        if (activities.length > 0) {
          delete activities[activities.length - 1].travel_to_next;
        }

        day.activities_json = JSON.stringify(activities);
        this.saveDay();
        this.editingTransport = null;
        this.$nextTick(() => this.updateMarkers());
        showToast('Activity removed', 'success');
      },

      changeTransportMode(activity, newMode) {
        const day = this.days.find(d => d.day_number === this.currentDay);
        if (!day) return;
        let activities = JSON.parse(day.activities_json);
        const idx = activities.findIndex(a => a.id === activity.id);
        if (idx < 0 || idx >= activities.length - 1) return;

        const next = activities[idx + 1];
        activities[idx].travel_to_next = estimateTransport(
          activities[idx], next, this._getTransportPrefs(), newMode
        );

        day.activities_json = JSON.stringify(activities);
        this.saveDay();
        this.editingTransport = null;
      },

      async shareTrip() {
        if (!this.trip?.share_slug) return;
        const url = `${window.location.origin}/share?s=${this.trip.share_slug}`;
        try {
          await navigator.clipboard.writeText(url);
          showToast('Share link copied!', 'success');
        } catch {
          prompt('Copy this link:', url);
        }
      },

      setMobileView(v) {
        this.mobileView = v;
        if (v === 'map') {
          this.$nextTick(() => {
            if (this.map) this.map.invalidateSize();
          });
        }
      },
    };
  }
  </script>
</body>
